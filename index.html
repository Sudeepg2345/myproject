<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch the Box Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.score{
    font-size:22px;
    margin-bottom:20px;
}

#game{
    width:700px;
    height:450px;
    background:#ffffff;
    border-radius:15px;
    position:relative;
    overflow:hidden;
    box-shadow:0 0 25px rgba(0,0,0,.4);
}

#box{
    width:50px;
    height:50px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    position:absolute;
    left:100px;
    top:100px;
    border-radius:12px;
    cursor:pointer;
    transition:.15s;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00e676;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Catch the Box</h1>

<div class="score">
Score : <span id="score">0</span>
</div>

<div id="game">
<div id="box"></div>
</div>

<button onclick="restart()">Restart Game</button>

</div>

<script>

const box=document.getElementById("box");
const scoreText=document.getElementById("score");

let score=0;

box.onclick=function(){

score++;

scoreText.innerHTML=score;

const game=document.getElementById("game");

const maxX=game.clientWidth-50;
const maxY=game.clientHeight-50;

const x=Math.random()*maxX;
const y=Math.random()*maxY;

box.style.left=x+"px";
box.style.top=y+"px";

box.style.background=
`hsl(${Math.random()*360},80%,55%)`;

}

function restart(){

score=0;
scoreText.innerHTML=0;

box.style.left="100px";
box.style.top="100px";

}

</script>

</body>
</html>
