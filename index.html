<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sudeep Flash Game - Mini Tetris</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#00ff99;
    margin:15px;
}

canvas{
    background:#222;
    border:3px solid #00ff99;
    width:min(90vw,320px);
    height:auto;
}

#score{
    font-size:22px;
    margin:10px;
}
</style>

</head>
<body>

<h1>🎮 SUDEEP FLASH GAME</h1>

<div id="score">Score : 0</div>

<canvas id="game" width="200" height="400"></canvas>

<p>⬅️ ➡️ Move | ⬇️ Drop</p>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const COLS=10;
const ROWS=20;
const SIZE=20;

let score=0;

const board=[];

for(let y=0;y<ROWS;y++){
    board[y]=Array(COLS).fill(0);
}

let block={
    x:4,
    y:0,
    color:"cyan"
};

function draw(){

ctx.fillStyle="#222";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let y=0;y<ROWS;y++){

for(let x=0;x<COLS;x++){

if(board[y][x]){

ctx.fillStyle=board[y][x];
ctx.fillRect(x*SIZE,y*SIZE,SIZE-1,SIZE-1);

}

}

}

ctx.fillStyle=block.color;
ctx.fillRect(block.x*SIZE,block.y*SIZE,SIZE-1,SIZE-1);

}

function update(){

block.y++;

if(block.y>=ROWS || board[block.y][block.x]){

block.y--;

board[block.y][block.x]=block.color;

clearLines();

block={
x:4,
y:0,
color:randomColor()
};

if(board[0][4]){

alert("Game Over");

location.reload();

}

}

draw();

}

function clearLines(){

for(let y=ROWS-1;y>=0;y--){

let full=true;

for(let x=0;x<COLS;x++){

if(board[y][x]==0){
full=false;
break;
}

}

if(full){

board.splice(y,1);
board.unshift(Array(COLS).fill(0));

score+=10;
document.getElementById("score").innerHTML="Score : "+score;

y++;

}

}

}

function randomColor(){

const colors=[
"red",
"lime",
"cyan",
"yellow",
"orange",
"magenta"
];

return colors[Math.floor(Math.random()*colors.length)];

}

document.addEventListener("keydown",e=>{

if(e.key=="ArrowLeft" && block.x>0){
block.x--;
}

if(e.key=="ArrowRight" && block.x<COLS-1){
block.x++;
}

if(e.key=="ArrowDown"){
update();
}

draw();

});

setInterval(update,500);

draw();

</script>

</body>
</html>
